name: Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para o deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Semgrep
        run: python3 -m pip install semgrep

      - name: Create reports directory
        run: mkdir -p SCANNERS

      - name: Start Server (Background)
        run: |
          npm start &
          npx wait-on http://localhost:3000 -t 30000

      - name: Run All Scanners
        run: npm run test:all || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Criar Index de Relatórios
        run: |
          echo "<html><body><h1>Relatórios de Segurança</h1><ul>" > SCANNERS/index.html
          for file in SCANNERS/*.html; do
            filename=$(basename "$file")
            echo "<li><a href='$filename'>$filename</a></li>" >> SCANNERS/index.html
          done
          echo "</ul></body></html>" >> SCANNERS/index.html

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./SCANNERS
