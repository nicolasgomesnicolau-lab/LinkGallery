name: Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create reports directory
        run: mkdir -p SCANNERS

      - name: Start Server (Background)
        run: |
          npm start &
          npx wait-on http://localhost:3000 -t 30000

      - name: Rodar Scanner SAST (Semgrep)
        run: |
          python3 -m pip install semgrep
          semgrep scan --config auto --output SCANNERS/semgrep.html || true

      - name: Rodar Scanner SCA (Snyk)
        run: |
          npm install -g snyk
          snyk test --json > SCANNERS/snyk.json || true
          npx snyk-to-html -i SCANNERS/snyk.json -o SCANNERS/snyk.html || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Rodar Scanner DAST (ZAP)
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run --rm -v ${PWD}/SCANNERS:/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://127.0.0.1:3000 -r relatorio-dast.html || true

      - name: Criar Index de Relatórios
        run: |
          echo "<html><body><h1>Relatórios de Segurança</h1><ul>" > SCANNERS/index.html
          for file in SCANNERS/*.html; do
            filename=$(basename "$file")
            if [ "$filename" != "index.html" ]; then
              echo "<li><a href='$filename'>$filename</a></li>" >> SCANNERS/index.html
            fi
          done
          echo "</ul></body></html>" >> SCANNERS/index.html
          echo "--- Arquivos gerados na pasta SCANNERS ---"
          ls -la SCANNERS/

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./SCANNERS
