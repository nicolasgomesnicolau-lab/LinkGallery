name: Security Reports

on:
  push:
    branches:
      - main

  workflow_dispatch:


permissions:
  contents: read
  pages: write
  id-token: write


concurrency:
  group: pages
  cancel-in-progress: true


jobs:
  security-scan:

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout do projeto
        uses: actions/checkout@v4


      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm


      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Instalar dependências
        run: npm install


      - name: Instalar Semgrep
        run: |
          pip install semgrep


      - name: Criar pasta SCANNERS
        run: mkdir -p SCANNERS


      - name: Iniciar aplicação
        run: |
          npm start &
          sleep 10


      - name: Executar Semgrep
        run: |
          semgrep scan \
            --config auto \
            --json \
            --output SCANNERS/semgrep.json || true


      - name: Criar relatório HTML Semgrep
        run: |
          python3 - <<'PY'
          import json

          with open("SCANNERS/semgrep.json") as f:
              data = json.load(f)

          html = """
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <title>Semgrep Report</title>
          <style>
          body {
            font-family: Arial;
            background:#111;
            color:white;
            margin:40px;
          }

          h1 {
            color:#4ea3ff;
          }

          .item {
            border:1px solid #444;
            padding:15px;
            margin:15px 0;
          }
          </style>
          </head>

          <body>

          <h1>Semgrep Report</h1>
          """

          results = data.get("results", [])

          if not results:
              html += "<h2>No issues found</h2>"
          else:
              for r in results:
                  html += f"""
                  <div class="item">
                  <b>{r.get('check_id')}</b><br>
                  File: {r.get('path')}<br>
                  Line: {r.get('start', {}).get('line')}<br><br>
                  {r.get('extra', {}).get('message')}
                  </div>
                  """

          html += """
          </body>
          </html>
          """

          with open("SCANNERS/semgrep.html","w") as f:
              f.write(html)

          PY


      - name: Executar Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: npm run test:security || true


      - name: Executar OWASP ZAP
        run: |
          docker run --rm \
            --user root \
            --network host \
            -v ${{ github.workspace }}/SCANNERS:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -r relatorio-dast.html || true


      - name: Criar página inicial
        run: |
          cat > SCANNERS/index.html <<EOF
          <!DOCTYPE html>
          <html>

          <head>
            <meta charset="UTF-8">
            <title>Security Reports</title>

            <style>
              body{
                font-family:Arial;
                margin:40px;
                background:#111;
                color:white;
              }

              h1{
                color:#4ea3ff;
              }

              a{
                display:block;
                margin:15px 0;
                font-size:20px;
                color:#4ea3ff;
              }
            </style>

          </head>


          <body>

            <h1>Security Reports</h1>

            <a href="snyk.html">
              📦 Snyk Report
            </a>

            <a href="relatorio-dast.html">
              🛡️ OWASP ZAP Report
            </a>

            <a href="semgrep.html">
              🔍 Semgrep Report
            </a>

          </body>

          </html>
          EOF


      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5


      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: SCANNERS


      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4